name: Monorepo static checks
env:
  YARN_ENABLE_HARDENED_MODE: 0
on:
  pull_request:
    paths-ignore:
      - packages/
      - apps/
  merge_group:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - packages/
      - apps/
  workflow_call:
  workflow_dispatch:

jobs:
  monorepo-static-checks:
    if: github.repository == 'software-mansion/react-native-reanimated'
    runs-on: ubuntu-latest
    concurrency:
      group: monorepo-static-checks-${{ github.ref }}
      cancel-in-progress: true
    steps:
      # Setup VM
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          cache: 'yarn'

      # Setup repo
      - name: Install dependencies
        run: yarn install --immutable

      # Checks
      - name: Lint
        run: yarn lint:root
      - name: Check markdown formatting
        id: md-format
        run: yarn format:md && git update-index --refresh && git diff-index --quiet HEAD --
      - name: Show markdown diff
        if: failure() && steps.md-format.outcome == 'failure'
        run: git diff
