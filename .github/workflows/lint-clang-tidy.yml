name: Lint clang-tidy
env:
  YARN_ENABLE_HARDENED_MODE: 0
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/lint-clang-tidy.yml'
      - '.clang-tidy'
      - 'scripts/clang-tidy-lint.sh'
      - 'packages/react-native-reanimated/android/src/main/cpp/**'
      - 'packages/react-native-reanimated/android/build.gradle'
      - 'packages/react-native-reanimated/Common/**'
      - 'packages/react-native-worklets/android/src/main/cpp/**'
      - 'packages/react-native-worklets/android/build.gradle'
      - 'packages/react-native-worklets/Common/**'
  pull_request:
    paths:
      - '.github/workflows/lint-clang-tidy.yml'
      - '.clang-tidy'
      - 'scripts/clang-tidy-lint.sh'
      - 'packages/react-native-reanimated/android/src/main/cpp/**'
      - 'packages/react-native-reanimated/android/build.gradle'
      - 'packages/react-native-reanimated/Common/**'
      - 'packages/react-native-worklets/android/src/main/cpp/**'
      - 'packages/react-native-worklets/android/build.gradle'
      - 'packages/react-native-worklets/Common/**'
  merge_group:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

jobs:
  lint-clang-tidy:
    if: github.repository == 'software-mansion/react-native-reanimated'
    concurrency:
      group: ${{github.workflow}}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install monorepo node dependencies
        run: yarn install --immutable

      - name: Clang-tidy lint Worklets
        run: yarn workspace react-native-worklets lint:clang-tidy

      - name: Clang-tidy lint Reanimated
        run: yarn workspace react-native-reanimated lint:clang-tidy
