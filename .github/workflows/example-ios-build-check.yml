name: Example iOS build check
env:
  YARN_ENABLE_HARDENED_MODE: 0
on:
  pull_request:
    paths:
      - .github/workflows/example-ios-build-check.yml
      - .github/actions/install-pods/**
      - .github/actions/cache-derived-data/**
      - scripts/llvm-tools/**
      - packages/react-native-reanimated/RNReanimated.podspec
      - packages/react-native-reanimated/scripts/reanimated_utils.rb
      - packages/react-native-reanimated/apple/**
      - packages/react-native-reanimated/Common/**
      - packages/react-native-worklets/RNWorklets.podspec
      - packages/react-native-worklets/scripts/worklets_utils.rb
      - packages/react-native-worklets/apple/**
      - packages/react-native-worklets/Common/**
      - apps/fabric-example/**
  merge_group:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - .github/workflows/example-ios-build-check.yml
      - .github/actions/install-pods/**
      - .github/actions/cache-derived-data/**
      - scripts/llvm-tools/**
      - packages/react-native-reanimated/RNReanimated.podspec
      - packages/react-native-reanimated/scripts/reanimated_utils.rb
      - packages/react-native-reanimated/apple/**
      - packages/react-native-reanimated/Common/**
      - packages/react-native-worklets/RNWorklets.podspec
      - packages/react-native-worklets/scripts/worklets_utils.rb
      - packages/react-native-worklets/apple/**
      - packages/react-native-worklets/Common/**
      - apps/fabric-example/**
  workflow_call:
    inputs:
      bundleMode:
        required: false
        type: boolean
        default: false
      configuration:
        required: false
        type: string
        default: Debug
  workflow_dispatch:

jobs:
  example-ios-build-check:
    if: github.repository == 'software-mansion/react-native-reanimated'
    runs-on: macos-26
    env:
      WORKING_DIRECTORY: apps/fabric-example
      REANIMATED_DIR: packages/react-native-reanimated
      CONFIGURATION: ${{ inputs.configuration || 'Debug' }}
      BUILD_MARKER_DIR: .build-markers
      CACHE_KEY: ios-${{ github.sha }}-${{ inputs.configuration || 'Debug' }}-${{ inputs.bundleMode || false }}
    concurrency:
      group: ios-${{ github.ref }}-${{ inputs.bundleMode }}-${{ inputs.configuration || 'Debug' }}
      cancel-in-progress: true
    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Restore result cache
        id: result-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.BUILD_MARKER_DIR }}/${{ env.CACHE_KEY }}.success
          key: example-ios-build-${{ env.CACHE_KEY }}

      - name: Skip already validated build
        if: steps.result-cache.outputs.cache-hit == 'true'
        run: echo "This commit already built successfully on iOS $CONFIGURATION."

      - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde
        if: steps.result-cache.outputs.cache-hit != 'true'
        with:
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Install LLVM tools (xcode-build-server + llvm clang-tidy)
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: brew install xcode-build-server llvm

      - name: Install monorepo node dependencies
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - name: Toggle Bundle Mode
        if: steps.result-cache.outputs.cache-hit != 'true' && inputs.bundleMode
        run: yarn toggle-bundle-mode
      - name: Build Reanimated package
        if: steps.result-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.REANIMATED_DIR }}
        run: yarn build

      - name: Install Pods (with caching)
        if: steps.result-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/install-pods
        with:
          working-directory: ${{ env.WORKING_DIRECTORY }}
          pod-directory: ios

      - name: Cache DerivedData
        if: steps.result-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/cache-derived-data
        with:
          platform: ios
          working-directory: ${{ env.WORKING_DIRECTORY }}
          pod-directory: ios

      - name: Build app (piped through xcode-build-server)
        if: steps.result-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.WORKING_DIRECTORY }}/ios
        shell: bash -eo pipefail {0}
        run: xcodebuild -workspace FabricExample.xcworkspace -configuration "$CONFIGURATION" -scheme "$CONFIGURATION FabricExample" -destination "generic/platform=iOS Simulator" 2>&1 | xcode-build-server parse -o compile_commands.json

      - name: Generate per-package compile_commands.json
        if: steps.result-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.WORKING_DIRECTORY }}/ios
        run: |
          ios_db="$(pwd)/compile_commands.json"
          for cpp_dir in ${{ github.workspace }}/packages/*/Common/cpp; do
            [ -d "$cpp_dir" ] || continue
            pkg_dir="${cpp_dir%/Common/cpp}"
            node ${{ github.workspace }}/scripts/llvm-tools/emit.js \
              "$pkg_dir/compile_commands.json" \
              "$ios_db" \
              "$pkg_dir/android/.cxx"
          done

      - name: Clang-tidy lint Worklets
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: yarn workspace react-native-worklets lint:clang-tidy:ios --strict

      - name: Clang-tidy lint Reanimated
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: yarn workspace react-native-reanimated lint:clang-tidy:ios --strict

      - name: Mark build successful
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${BUILD_MARKER_DIR}"
          echo "ok" > "${BUILD_MARKER_DIR}/${CACHE_KEY}.success"

      - name: Save result cache
        if: steps.result-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.BUILD_MARKER_DIR }}/${{ env.CACHE_KEY }}.success
          key: example-ios-build-${{ env.CACHE_KEY }}
