name: Example tvOS build check
env:
  YARN_ENABLE_HARDENED_MODE: 0
on:
  pull_request:
    paths:
      - .github/workflows/example-tvos-build-check.yml
  schedule:
    - cron: '37 19 * * *'
  workflow_call:
    inputs:
      configuration:
        required: false
        type: string
        default: Debug
  workflow_dispatch:

jobs:
  example-tvos-build-check:
    if: github.repository == 'software-mansion/react-native-reanimated'
    runs-on: macos-26
    env:
      WORKING_DIRECTORY: apps/tvos-example
      REANIMATED_DIR: packages/react-native-reanimated
      CONFIGURATION: ${{ inputs.configuration || 'Debug' }}
      BUILD_MARKER_DIR: .build-markers
      CACHE_KEY: tvos-${{ github.sha }}-${{ inputs.configuration || 'Debug' }}
    concurrency:
      group: tvos-${{ github.ref }}-${{ inputs.configuration || 'Debug' }}
      cancel-in-progress: true
    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Restore result cache
        id: result-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.BUILD_MARKER_DIR }}/${{ env.CACHE_KEY }}.success
          key: example-tvos-build-${{ env.CACHE_KEY }}

      - name: Skip already validated build
        if: steps.result-cache.outputs.cache-hit == 'true'
        run: echo "This commit already built successfully on tvOS $CONFIGURATION."

      - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde
        if: steps.result-cache.outputs.cache-hit != 'true'
        with:
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Install monorepo node dependencies
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - name: Build Reanimated package
        if: steps.result-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.REANIMATED_DIR }}
        run: yarn build

      - name: Install Pods (with caching)
        if: steps.result-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/install-pods
        with:
          working-directory: ${{ env.WORKING_DIRECTORY }}
          pod-directory: ios

      - name: Cache DerivedData
        if: steps.result-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/cache-derived-data
        with:
          platform: tvos
          working-directory: ${{ env.WORKING_DIRECTORY }}
          pod-directory: ios

      - name: Build app
        if: steps.result-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.WORKING_DIRECTORY }}/ios
        run: xcodebuild -workspace TVOSExample.xcworkspace -configuration "$CONFIGURATION" -scheme "$CONFIGURATION TVOSExample" -destination "generic/platform=tvOS Simulator" -quiet

      - name: Mark build successful
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${BUILD_MARKER_DIR}"
          echo "ok" > "${BUILD_MARKER_DIR}/${CACHE_KEY}.success"

      - name: Save result cache
        if: steps.result-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.BUILD_MARKER_DIR }}/${{ env.CACHE_KEY }}.success
          key: example-tvos-build-${{ env.CACHE_KEY }}
