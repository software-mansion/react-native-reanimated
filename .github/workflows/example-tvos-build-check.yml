name: Example tvOS build check
env:
  YARN_ENABLE_HARDENED_MODE: 0
on:
  pull_request:
    paths:
      - .github/workflows/example-tvos-build-check.yml
  schedule:
    - cron: '37 19 * * *'
  workflow_call:
    inputs:
      configuration:
        required: false
        type: string
        default: Debug
  workflow_dispatch:

jobs:
  example-tvos-build-check:
    if: github.repository == 'software-mansion/react-native-reanimated'
    runs-on: macos-26
    env:
      WORKING_DIRECTORY: apps/tvos-example
      REANIMATED_DIR: packages/react-native-reanimated
      CONFIGURATION: ${{ inputs.configuration || 'Debug' }}
    concurrency:
      group: tvos-${{ github.ref }}-${{ inputs.configuration || 'Debug' }}
      cancel-in-progress: true
    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde
        with:
          ruby-version: '3.3' # Not needed with a `.ruby-version` or `.tool-versions`
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Install monorepo node dependencies
        run: yarn install --immutable
      - name: Build Reanimated package
        working-directory: ${{ env.REANIMATED_DIR }}
        run: yarn build

      - name: Install Pods (with caching)
        uses: ./.github/actions/install-pods
        with:
          working-directory: ${{ env.WORKING_DIRECTORY }}
          pod-directory: ios

      - name: Cache DerivedData
        uses: ./.github/actions/cache-derived-data
        with:
          platform: tvos
          working-directory: ${{ env.WORKING_DIRECTORY }}
          pod-directory: ios

      - name: Build app
        working-directory: ${{ env.WORKING_DIRECTORY }}/ios
        run: xcodebuild -workspace TVOSExample.xcworkspace -configuration "$CONFIGURATION" -scheme "$CONFIGURATION TVOSExample" -destination "generic/platform=tvOS Simulator" -quiet
