name: Main build [Nightly]
on:
  schedule:
    # 02:17 UTC — offset from other nightly crons to spread runner load
    - cron: '17 2 * * *'
  pull_request:
    paths:
      - .github/workflows/main-build-nightly.yml
  workflow_dispatch:

jobs:
  android:
    if: github.repository == 'software-mansion/react-native-reanimated'
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    uses: ./.github/workflows/example-android-build-check.yml
    with:
      configuration: ${{ matrix.configuration }}

  ios:
    if: github.repository == 'software-mansion/react-native-reanimated'
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    uses: ./.github/workflows/example-ios-build-check.yml
    with:
      configuration: ${{ matrix.configuration }}

  macos:
    if: github.repository == 'software-mansion/react-native-reanimated'
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    uses: ./.github/workflows/example-macos-build-check.yml
    with:
      configuration: ${{ matrix.configuration }}

  tvos:
    if: github.repository == 'software-mansion/react-native-reanimated'
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    uses: ./.github/workflows/example-tvos-build-check.yml
    with:
      configuration: ${{ matrix.configuration }}
