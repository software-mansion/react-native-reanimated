name: Github "Close when stale" [Nightly]
on:
  schedule:
    - cron: '37 21 * * *' # at 21:37 every day
  issues:
    types: [edited]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:

jobs:
  github-close-when-stale-nightly:
    if: github.repository == 'software-mansion/react-native-reanimated'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: 'software-mansion-labs/swmansion-bot'
          ref: b9b49d4de95b48a5a9688f94a7642b49f0e810c7

      - uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Install Actions
        run: yarn install

      - name: Close when stale
        uses: ./close-when-stale
        with:
          close-when-stale-label: 'Close when stale'
          days-to-close: 14
