name: Slack integration
env:
  YARN_ENABLE_HARDENED_MODE: 0

on:
  schedule:
    - cron: '0 6 * * *' # 08:00 CEST (UTC+2)
  workflow_dispatch:
  issues:
    types: [opened]

jobs:
  daily-status-report:
    if: github.repository == 'software-mansion/react-native-reanimated' && github.event_name != 'issues'
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          sparse-checkout: .github/workflows/helper

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.nvmrc'

      - name: Report failing badges and RN nightly tests
        run: node --experimental-strip-types .github/workflows/helper/nightly-fail-notification.ts

  issue-opened-report:
    if: github.repository == 'software-mansion/react-native-reanimated' && github.event_name == 'issues'
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          sparse-checkout: .github/workflows/helper

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.nvmrc'

      - name: Report new issue to Slack
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: node --experimental-strip-types .github/workflows/helper/issue-opened-notification.ts
