name: Worklets static checks
env:
  YARN_ENABLE_HARDENED_MODE: 0
on:
  pull_request:
  merge_group:
    branches:
      - main
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

jobs:
  worklets-static-checks:
    if: github.repository == 'software-mansion/react-native-reanimated'
    runs-on: ubuntu-latest
    concurrency:
      group: worklets-static-checks-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          cache: yarn
      - name: Run static checks
        uses: ./.github/actions/package-static-checks
        with:
          package-dir: packages/react-native-worklets
          build-commands: |
            yarn workspace react-native-worklets build
            yarn workspace react-native-reanimated build
