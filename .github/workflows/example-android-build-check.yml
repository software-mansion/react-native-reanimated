name: Example Android build check
env:
  YARN_ENABLE_HARDENED_MODE: 0
on:
  pull_request:
    paths:
      - .github/workflows/example-android-build-check.yml
      - .clang-tidy
      - scripts/llvm-tools/**
      - packages/react-native-reanimated/android/**
      - packages/react-native-reanimated/Common/**
      - packages/react-native-worklets/android/**
      - packages/react-native-worklets/Common/**
      - apps/fabric-example/package.json
      - apps/fabric-example/android/**
  merge_group:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - .github/workflows/example-android-build-check.yml
      - .clang-tidy
      - scripts/llvm-tools/**
      - packages/react-native-reanimated/android/**
      - packages/react-native-reanimated/Common/**
      - packages/react-native-worklets/android/**
      - packages/react-native-worklets/Common/**
      - apps/fabric-example/package.json
      - apps/fabric-example/android/**
  workflow_call:
    inputs:
      bundleMode:
        required: false
        type: boolean
        default: false
      configuration:
        required: false
        type: string
        default: Debug
  workflow_dispatch:

jobs:
  example-android-build-check:
    if: github.repository == 'software-mansion/react-native-reanimated'
    runs-on: ubuntu-latest
    env:
      WORKING_DIRECTORY: apps/fabric-example
      REANIMATED_DIR: packages/react-native-reanimated
      CONFIGURATION: ${{ inputs.configuration || 'Debug' }}
      BUILD_MARKER_DIR: .build-markers
      CACHE_KEY: android-${{ github.sha }}-${{ inputs.configuration || 'Debug' }}-${{ inputs.bundleMode || false }}
    concurrency:
      group: android-${{ github.ref }}-${{ inputs.bundleMode }}-${{ inputs.configuration || 'Debug' }}
      cancel-in-progress: true
    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Restore result cache
        id: result-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.BUILD_MARKER_DIR }}/${{ env.CACHE_KEY }}.success
          key: example-android-build-${{ env.CACHE_KEY }}

      - name: Skip already validated build
        if: steps.result-cache.outputs.cache-hit == 'true'
        run: echo "This commit already built successfully on Android $CONFIGURATION."

      - name: Setup Java 17
        if: steps.result-cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62
        with:
          distribution: 'zulu'
          java-version: 17

      # TODO: Add caching for node_modules and artifacts that will work with monorepo setup.
      - name: Install monorepo node dependencies
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable
      - name: Toggle Bundle Mode
        if: steps.result-cache.outputs.cache-hit != 'true' && inputs.bundleMode
        run: yarn toggle-bundle-mode
      - name: Build Reanimated package
        if: steps.result-cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.REANIMATED_DIR }}
        run: yarn build

      - name: Build app (Debug)
        if: steps.result-cache.outputs.cache-hit != 'true' && env.CONFIGURATION == 'Debug'
        working-directory: ${{ env.WORKING_DIRECTORY }}/android
        run: ./gradlew assembleDebug --build-cache -PreactNativeArchitectures=arm64-v8a

      - name: Build app (Release)
        if: steps.result-cache.outputs.cache-hit != 'true' && env.CONFIGURATION == 'Release'
        working-directory: ${{ env.WORKING_DIRECTORY }}/android
        run: ./gradlew assembleRelease --build-cache -PreactNativeArchitectures=arm64-v8a

      - name: Clang-tidy lint Worklets
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: yarn workspace react-native-worklets lint:clang-tidy:android --strict

      - name: Clang-tidy lint Reanimated
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: yarn workspace react-native-reanimated lint:clang-tidy:android --strict

      - name: Mark build successful
        if: steps.result-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${BUILD_MARKER_DIR}"
          echo "ok" > "${BUILD_MARKER_DIR}/${CACHE_KEY}.success"

      - name: Save result cache
        if: steps.result-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.BUILD_MARKER_DIR }}/${{ env.CACHE_KEY }}.success
          key: example-android-build-${{ env.CACHE_KEY }}
