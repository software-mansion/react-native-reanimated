name: Android validation
description: Lint Android Java/Kotlin code and C++ code

inputs:
  package-dir:
    description: The package directory (e.g., packages/react-native-reanimated)
    required: true
  build-package:
    description: Whether to build the package before linting
    default: 'true'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Setup Java 17
      uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62
      with:
        distribution: 'zulu'
        java-version: 17

    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        cache: 'yarn'

    - name: Install clang-tidy and cmakelang
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy
        python -m pip install --upgrade pip
        python -m pip install cmakelang==0.6.13

    - name: Clear annotations
      shell: bash
      run: .github/workflows/helper/clear-annotations.sh

    - name: Install monorepo node dependencies
      shell: bash
      run: yarn install --immutable

    - name: Install Android NDK matching the example app's pin
      shell: bash
      run: |
        set -e
        NDK_VERSION="$(grep -oE 'ndkVersion\s*=\s*"[^"]+"' apps/fabric-example/android/build.gradle | sed -E 's/.*"([^"]+)".*/\1/')"
        echo "installing ndk;$NDK_VERSION"
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
        printf 'y\n%.0s' $(seq 50) | "$SDKMANAGER" --licenses > /dev/null
        "$SDKMANAGER" --install "ndk;$NDK_VERSION"

    - name: Generate Android compile database
      shell: bash
      working-directory: apps/fabric-example/android
      run: ./gradlew :react-native-reanimated:configureCMakeDebug :react-native-worklets:configureCMakeDebug -PreactNativeArchitectures=arm64-v8a

    - name: Lint Android
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: yarn lint:android

    - name: Lint Android (clang-tidy)
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: yarn lint:clang-tidy:android --strict
