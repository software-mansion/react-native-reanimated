[package]
name = "worklets-plugin-oxc"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
oxc = { version = "0.132", features = ["semantic", "codegen", "transformer", "ast_visit"] }
oxc_allocator = "0.132"
oxc_ast = "0.132"
oxc_ast_visit = "0.132"
oxc_codegen = "0.132"
oxc_sourcemap = "6"
oxc_transformer = "0.132"
oxc_parser = "0.132"
oxc_semantic = "0.132"
oxc_span = "0.132"
oxc_syntax = "0.132"
oxc_traverse = "0.132"

napi = { version = "3", default-features = false, features = ["napi4", "serde-json"] }
napi-derive = "3"

serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
codegen-units = 1
